<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>영작 실전 마스터 PRO+</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        :root { 
            --primary: #2563eb; --success: #059669; --danger: #dc2626;
            --bg: #f8fafc; --card-bg: #ffffff; --text: #1e293b;
        }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; line-height: 1.6; }
        .container { max-width: 800px; margin: 0 auto; }
        
        header { text-align: center; padding: 40px 0; background: linear-gradient(135deg, #1e40af, #7c3aed); color: white; border-radius: 24px; margin-bottom: 30px; }
        header h1 { margin: 8px 0; font-size: 2.2rem; font-weight: 800; letter-spacing: -1.5px; }

        .card { background: var(--card-bg); padding: 30px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-bottom: 25px; border: 1px solid #f1f5f9; }
        .section-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 18px; color: #334155; }

        /* Grid & Selection */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
        .checkbox-item { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border: 1.5px solid #f1f5f9; border-radius: 12px; transition: 0.2s; cursor: pointer; }
        .checkbox-item:hover { border-color: var(--primary); background: #eff6ff; }
        
        select, textarea { width: 100%; padding: 14px; border-radius: 12px; border: 1.5px solid #e2e8f0; font-size: 1rem; box-sizing: border-box; outline: none; }
        textarea { height: 120px; font-family: inherit; resize: none; }

        /* Buttons */
        button { cursor: pointer; border: none; border-radius: 12px; padding: 14px 24px; font-weight: 700; transition: 0.2s; font-family: inherit; }
        .btn-main { background: var(--primary); color: white; width: 100%; font-size: 1.1rem; }
        .btn-next { background: var(--success); color: white; width: 100%; display: none; }
        .btn-util { background: #f1f5f9; color: #475569; font-size: 0.85rem; padding: 8px 16px; }

        /* Toggle Switch */
        .switch-container { display: flex; align-items: center; gap: 10px; margin-top: 15px; font-weight: 600; font-size: 0.9rem; }
        
        /* Hint & Strike-through */
        #examArea { display: none; }
        .hint-box { background: #fffbeb; border-left: 5px solid #fcd34d; padding: 18px; border-radius: 8px; margin-bottom: 25px; min-height: 40px; }
        .hint-word { display: inline-block; margin-right: 8px; transition: all 0.2s; }
        .used-word { text-decoration: line-through; opacity: 0.3; color: #94a3b8; }
        
        .badge { display: inline-block; padding: 5px 12px; border-radius: 8px; font-size: 0.8rem; font-weight: 800; margin-bottom: 15px; }
        .badge-lv1 { background: #dcfce7; color: #15803d; }
        .badge-lv2 { background: #fef9c3; color: #a16207; }
        .badge-lv3 { background: #fee2e2; color: #b91c1c; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div style="font-size: 0.85rem; opacity: 0.8;">CS & AI STUDY | 건희</div>
        <h1>영작 실전 마스터</h1>
    </header>

    <div class="card" id="setupCard">
        <div class="section-title">📖 지문 선택 및 학습 설정</div>
        <div class="grid" id="passageGrid"></div>
        
        <div style="margin-top:20px; display:flex; gap:10px;">
            <button class="btn-util" onclick="toggleAll(true)">전체 선택</button>
            <button class="btn-util" onclick="toggleAll(false)">전체 해제</button>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px;">
            <div>
                <div class="section-title">🎯 모드 및 순서</div>
                <select id="modeSelect">
                    <option value="practical">실속 모드 (주장문 위주)</option>
                    <option value="perfect">100점을 향해 (전체 문장)</option>
                </select>
                <div class="switch-container">
                    <input type="checkbox" id="orderToggle"> 
                    <label for="orderToggle">문장 순서대로 학습하기</label>
                </div>
            </div>
            <div>
                <div class="section-title">⚡ 난이도 및 옵션</div>
                <div style="display:flex; gap:12px; margin-bottom:10px;">
                    <label><input type="checkbox" class="lv-chk" value="1" checked> 1단</label>
                    <label><input type="checkbox" class="lv-chk" value="2"> 2단</label>
                    <label><input type="checkbox" class="lv-chk" value="3"> 3단</label>
                </div>
                <div class="switch-container">
                    <input type="checkbox" id="useStrikeToggle" checked> 
                    <label for="useStrikeToggle">사용한 단어 표시</label>
                </div>
            </div>
        </div>
        <button class="btn-main" style="margin-top:30px;" onclick="startSession()">테스트 시작하기</button>
    </div>

    <div id="examArea">
        <div class="card">
            <div id="lvBadgeContainer"></div>
            <div id="korQ" style="font-size:1.4rem; font-weight:800; margin-bottom:25px; color: #0f172a;"></div>
            <div id="hintArea" class="hint-box"></div>
            <textarea id="userInput" placeholder="영문장을 입력하세요..." oninput="updateStrikeThrough()"></textarea>
            <div style="display:flex; gap:12px; margin-top:25px;">
                <button id="btnCheck" class="btn-main" style="flex: 2;" onclick="checkAnswer()">채점 및 정답확인</button>
                <button id="btnNext" class="btn-next" style="flex: 2;" onclick="goNext()">다음 문제로 👉</button>
                <button class="btn-util" style="flex: 1; background:#f97316; color:white;" onclick="saveToWrongNote()">오답 저장</button>
            </div>
            <div id="feedback" style="margin-top:20px; font-weight:700; font-size:1.1rem;"></div>
        </div>
    </div>

    <div class="card">
        <div class="section-title">📓 누적 오답 복습</div>
        <div id="wrongNoteDisplay">기록된 오답이 없습니다.</div>
        <button class="btn-util" style="margin-top:20px; color:var(--danger); width:100%;" onclick="clearNotes()">오답 기록 초기화</button>
    </div>
</div>

<script>
// 데이터베이스 
const db = [
    { title: "1번 (기후 조절)", kor: "국지적인 온도 조절은 미시 기후 규모에서는 때때로 효과적이다.", eng: "Localized temperature control is sometimes effective on a microclimate scale.", isThesis: true },
    { title: "2번 (충성심)", kor: "직원들의 충성이란 더 많은 돈이나 혜택을 거절하고 같은 회사에서 계속 일하는 것이다.", eng: "Loyalty among employees is when they turn down more money or benefits to continue working at the same company.", isThesis: true },
    { title: "2번 (목적)", kor: "우리는 단순히 벽을 쌓기 위해 일하러 오는 것이 아니라, 성당을 짓기 위해 일하러 오고 싶어 한다.", eng: "We don't want to come to work to build a wall we want to come to work to build a cathedral.", isThesis: true },
    { title: "3번 (DNA)", kor: "DNA는 우리 안에 있는 역사이지만 동시에 우리를 지배하는 존재이기도 하다.", eng: "DNA is a history that is inside us and yet one that is our master as well.", isThesis: true },
    { title: "4번 (사고의 두려움)", kor: "이것이 우리가 사고를 그렇게 두려워하는 이유 중 하나인데, 그것이 우리를 근본적으로 흔들기 때문이다.", eng: "This is one reason why we are so afraid of it it shakes us to the core.", isThesis: true },
    { title: "5번 (지식과 에너지)", kor: "우리가 먹는 것은 인간의 지식을 통해 여과되고, 농축되고, 정제된 태양 에너지이다.", eng: "What we eat is solar energy filtered concentrated and distilled through the lens of human knowledge.", isThesis: true },
    { title: "6번 (정보 민주화)", kor: "기술이 그들에게 지역사회에 필수적인 정보를 전달하는 방송자이자 출판자로 행동할 수 있는 도구를 제공한다.", eng: "The technology gives them the tools to act as broadcasters and publishers of information essential to their immediate community.", isThesis: true },
    { title: "7번 (비판적 사고)", kor: "비판적 사고는 반드시 필요하며, 우리는 증거를 존중해야 한다.", eng: "Critical thinking is an absolute must and we must respect evidence.", isThesis: true },
    { title: "8번 (불안과 연민)", kor: "불안을 연민으로 바꾸는 것은 당신 안에 본래 존재하는 능력이다.", eng: "Flipping anxiety into compassion is something inherent in you.", isThesis: true }
];

const coreKeywords = ["microclimate", "localized", "cathedral", "loyalty", "distilled", "concentrated", "broadcasters", "essential", "inherent", "compassion", "critical", "evidence"];
let currentQ = [];
let idx = 0;
let currentHintWords = [];

function createGrid() {
    const unique = [...new Set(db.map(i => i.title))];
    document.getElementById('passageGrid').innerHTML = unique.map(t => `
        <label class="checkbox-item"><input type="checkbox" class="psg-chk" value="${t}" checked> ${t}</label>
    `).join('');
}

function toggleAll(s) { document.querySelectorAll('.psg-chk').forEach(c => c.checked = s); }

// 실시간 줄 긋기 처리 함수 [cite: 2025-12-02]
function updateStrikeThrough() {
    if (!document.getElementById('useStrikeToggle').checked) return;
    
    const userText = document.getElementById('userInput').value.toLowerCase();
    const userWords = userText.match(/\b\w+\b/g) || [];
    
    // 힌트 박스 내의 각 단어 요소를 순회하며 줄 긋기 여부 판단
    const hintElements = document.querySelectorAll('.hint-word');
    let tempUserWords = [...userWords];

    hintElements.forEach(el => {
        const word = el.innerText.toLowerCase().replace(/[.;:,]/g, "");
        const wordIndex = tempUserWords.indexOf(word);
        
        if (wordIndex !== -1) {
            el.classList.add('used-word');
            tempUserWords.splice(wordIndex, 1); // 사용된 단어는 목록에서 제거 (중복 단어 처리)
        } else {
            el.classList.remove('used-word');
        }
    });
}

function getHintArray(str, lv) {
    let clean = str.replace(/[.;:,]/g, "");
    let words = clean.split(" ");
    
    if (lv == 1) return words.map(w => w.toLowerCase()).sort(() => Math.random() - 0.5);
    if (lv == 2) return words.filter(w => w.length >= 5 || /[A-Z]/.test(w[0])).map(w => w.toLowerCase());
    if (lv == 3) return words.filter(w => w.length >= 7 || coreKeywords.includes(w.toLowerCase())).map(w => w.toLowerCase());
}

function startSession() {
    const mode = document.getElementById('modeSelect').value;
    const lvs = Array.from(document.querySelectorAll('.lv-chk:checked')).map(c => parseInt(c.value));
    const selected = Array.from(document.querySelectorAll('.psg-chk:checked')).map(c => c.value);
    const isSequential = document.getElementById('orderToggle').checked;
    
    if(!lvs.length || !selected.length) return alert("조건을 선택해주세요.");

    currentQ = db.filter(i => selected.includes(i.title) && (mode === 'perfect' || i.isThesis))
        .map(i => ({ ...i, lv: lvs[Math.floor(Math.random() * lvs.length)] }));

    // 문장 순서 학습 여부에 따른 셔플 제어 [cite: 2025-12-02]
    if (!isSequential) {
        currentQ.sort(() => Math.random() - 0.5);
    }

    if(!currentQ.length) return alert("문장이 없습니다.");
    idx = 0;
    document.getElementById('setupCard').style.display = 'none';
    document.getElementById('examArea').style.display = 'block';
    renderQ();
}

function renderQ() {
    const q = currentQ[idx];
    const badgeClass = q.lv == 1 ? 'badge-lv1' : (q.lv == 2 ? 'badge-lv2' : 'badge-lv3');
    document.getElementById('lvBadgeContainer').innerHTML = `<span class="badge ${badgeClass}">${q.lv}단계 | ${q.title}</span>`;
    document.getElementById('korQ').innerText = q.kor;
    
    // 힌트를 단어별 스판으로 생성 [cite: 2026-04-04]
    const hintWords = getHintArray(q.eng, q.lv);
    const hintHTML = hintWords.map(w => `<span class="hint-word">${w}</span>`).join(" ");
    document.getElementById('hintArea').innerHTML = hintHTML || "구조를 생각하며 영작하세요.";
    
    document.getElementById('userInput').value = "";
    document.getElementById('feedback').innerText = "";
    document.getElementById('btnCheck').style.display = 'block';
    document.getElementById('btnNext').style.display = 'none';
}

function checkAnswer() {
    const user = document.getElementById('userInput').value.trim().toLowerCase().replace(/[.;:,]/g, "");
    const real = currentQ[idx].eng.toLowerCase().replace(/[.;:,]/g, "");
    const f = document.getElementById('feedback');

    if (user === real) {
        f.style.color = "var(--success)";
        f.innerText = "✅ 정답입니다! 문장을 복습하고 버튼을 누르세요.";
        document.getElementById('btnCheck').style.display = 'none';
        document.getElementById('btnNext').style.display = 'block';
    } else {
        f.style.color = "var(--danger)";
        f.innerHTML = `❌ 오답입니다.<br><span style="font-size:0.9rem; color:#64748b;">정답: ${currentQ[idx].eng}</span>`;
    }
}

function goNext() {
    idx++;
    if (idx < currentQ.length) renderQ();
    else { alert("🎉 학습 완료!"); location.reload(); }
}

function saveToWrongNote() {
    let note = JSON.parse(localStorage.getItem('wrongNote') || "[]");
    if (!note.some(n => n.eng === currentQ[idx].eng)) {
        note.push(currentQ[idx]);
        localStorage.setItem('wrongNote', JSON.stringify(note));
        renderNotes(); alert("오답노트 저장됨!");
    }
}

function renderNotes() {
    const note = JSON.parse(localStorage.getItem('wrongNote') || "[]");
    document.getElementById('wrongNoteDisplay').innerHTML = note.length ? note.map(n => `
        <div class="wrong-item"><b>[${n.title}]</b> ${n.kor}<br><small>${n.eng}</small></div>
    `).join('') : "기록된 오답이 없습니다.";
}

function clearNotes() { if(confirm("초기화?")) { localStorage.removeItem('wrongNote'); renderNotes(); } }

createGrid(); renderNotes();
</script>
</body>
</html>
