<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>영작 실전 마스터 (난이도 최적화)</title>
    <style>
        :root {
            --primary: #4CAF50;
            --secondary: #2196F3;
            --bg: #f8f9fa;
            --card-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 20px;
            color: #333;
            line-height: 1.6;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: var(--card-shadow);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 3px solid #e1e8ed;
            padding-bottom: 20px;
        }

        .header h1 {
            color: #1a202c;
            font-size: 1.8rem;
            margin: 10px 0;
        }

        .author {
            color: #718096;
            font-weight: 500;
            font-size: 0.9rem;
        }

        /* Setup Section */
        .setup-card {
            background: #f1f5f9;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
        }

        .setup-group {
            margin-bottom: 20px;
        }

        .setup-title {
            font-weight: 800;
            margin-bottom: 10px;
            display: block;
            color: #2d3748;
        }

        /* Passage Selection Grid */
        .passage-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
            background: white;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #cbd5e1;
        }

        .passage-item {
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .btn-start {
            background: var(--secondary);
            color: white;
            border: none;
            cursor: pointer;
            width: 100%;
            font-weight: 700;
            padding: 15px;
            border-radius: 10px;
            font-size: 1.1rem;
            margin-top: 10px;
        }

        .btn-utility {
            background: #edf2f7;
            border: 1px solid #cbd5e1;
            padding: 5px 10px;
            font-size: 0.8rem;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 10px;
        }

        /* Exam Card */
        .exam-card {
            border: 2px solid #edf2f7;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 25px;
            display: none;
        }

        .level-badge {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .korean-q {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: #2d3748;
        }

        .hint-container {
            background: #fffbeb;
            border-left: 5px solid #f6e05e;
            padding: 15px;
            border-radius: 4px;
            font-style: italic;
            color: #744210;
            margin-bottom: 20px;
            min-height: 20px;
        }

        textarea {
            width: 100%;
            height: 100px;
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #e2e8f0;
            font-size: 1.1rem;
            resize: none;
            box-sizing: border-box;
            outline: none;
        }

        .action-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-check {
            flex: 2;
            background: var(--primary);
            color: white;
            border: none;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-wrong {
            flex: 1;
            background: #ed8936;
            color: white;
            border: none;
            font-weight: 700;
            cursor: pointer;
        }

        .wrong-note-area {
            margin-top: 50px;
            border-top: 2px dashed #cbd5e1;
            padding-top: 30px;
        }

        .wrong-item {
            background: #fff5f5;
            border: 1px solid #fed7d7;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="header">
            <span class="author">✨ made by 👨‍🏫민건희,정서진 Shout out to 👨‍🏫이용휘T✨</span>
            <h1>영작 실전 마스터 (수행평가 완벽 대비)</h1>
        </div>

        <div class="setup-card">
            <div class="setup-group">
                <span class="setup-title">1. 지문 선택</span>
                <button class="btn-utility" onclick="toggleAllPassages(true)">전체 선택</button>
                <button class="btn-utility" onclick="toggleAllPassages(false)">전체 해제</button>
                <div class="passage-grid" id="passageGrid"></div>
            </div>

            <div class="setup-group" style="display: flex; gap: 30px;">
                <div>
                    <span class="setup-title">2. 학습 모드</span>
                    <select id="modeSelect">
                        <option value="practical">실속 모드 (주장문 위주)</option>
                        <option value="perfect">100점을 향해 (전체 문장)</option>
                    </select>
                </div>
                <div>
                    <span class="setup-title">3. 난이도</span>
                    <label><input type="checkbox" class="lv-chk" value="1" checked> 1단계</label>
                    <label style="margin-left:10px;"><input type="checkbox" class="lv-chk" value="2"> 2단계</label>
                    <label style="margin-left:10px;"><input type="checkbox" class="lv-chk" value="3"> 3단계</label>
                </div>
            </div>
            <button class="btn-start" onclick="initExam()">선택한 조건으로 시작하기</button>
        </div>

        <div id="examDisplay" class="exam-card">
            <span id="levelBadge" class="level-badge"></span>
            <div id="korText" class="korean-q"></div>
            <div id="hintBox" class="hint-container"></div>
            <textarea id="engInput" placeholder="정답을 입력하세요..."></textarea>
            <div class="action-group">
                <button class="btn-check" onclick="processCheck()">채점 및 정답보기</button>
                <button class="btn-wrong" onclick="saveWrong()">오답노트 저장</button>
            </div>
            <div id="resultMsg" style="margin-top:15px; font-weight:bold;"></div>
        </div>

        <div class="wrong-note-area">
            <h3>📂 누적 오답 복습 노트</h3>
            <div id="noteContainer">기록된 오답이 없습니다.</div>
            <button onclick="clearAllNotes()"
                style="margin-top:15px; background:#e53e3e; color:white; font-size:0.8rem; border:none; padding:5px 10px; border-radius:5px; cursor:pointer;">초기화</button>
        </div>
    </div>

    <script>
        // 데이터베이스 (전달해주신 8개 지문 기반) 
        const db = [
            { title: "1번 (기후 조절)", kor: "국지적인 온도 조절은 미시 기후 규모에서는 때때로 효과적이다.", eng: "Localized temperature control is sometimes effective on a microclimate scale.", isThesis: true },
            { title: "2번 (충성심과 목적)", kor: "직원들의 충성이란 더 많은 돈이나 혜택을 거절하고 같은 회사에서 계속 일하는 것이다.", eng: "Loyalty among employees is when they turn down more money or benefits to continue working at the same company.", isThesis: true },
            { title: "2번 (충성심과 목적)", kor: "우리는 단순히 벽을 쌓기 위해 일하러 오는 것이 아니라, 성당을 짓기 위해 일하러 오고 싶어 한다.", eng: "We don't want to come to work to build a wall; we want to come to work to build a cathedral.", isThesis: true },
            { title: "3번 (DNA와 역사)", kor: "우리 세포 속 각각의 DNA 가닥은 생물학적 역사의 고대 기록이다.", eng: "Each strand of DNA in each of our cells is an ancient record of biological history.", isThesis: true },
            { title: "4번 (사고와 두려움)", kor: "이것이 우리가 사고를 그렇게 두려워하는 이유 중 하나인데, 그것이 우리를 근본적으로 흔들기 때문이다.", eng: "This is one reason why we are so afraid of it: it shakes us to the core.", isThesis: true },
            { title: "5번 (지식과 에너지)", kor: "우리가 먹는 것은 인간의 지식을 통해 여과되고 정제된 태양 에너지이다.", eng: "What we eat is solar energy filtered and distilled through the lens of human knowledge.", isThesis: true },
            { title: "6번 (정보의 민주화)", kor: "저널리즘은 아마도 전문 기자나 부유한 출판업자가 아니라 대중의 것이 되었다.", eng: "Journalism perhaps belongs to the people rather than to professional journalists or wealthy publishers.", isThesis: true },
            { title: "7번 (비판적 사고)", kor: "비판적 사고는 반드시 필요하며, 우리는 증거를 존중해야 한다.", eng: "Critical thinking is an absolute must, and we must respect evidence.", isThesis: true },
            { title: "8번 (불안과 연민)", kor: "불안을 연민으로 바꾸는 것은 당신 안에 본래 존재하는 능력이다.", eng: "Flipping anxiety into compassion is something inherent in you.", isThesis: true }
        ];

        let sessionQuestions = [];
        let cursor = 0;

        // 지문 목록 생성
        function createPassageGrid() {
            const unique = [...new Set(db.map(i => i.title))];
            document.getElementById('passageGrid').innerHTML = unique.map(t => `
        <label class="passage-item"><input type="checkbox" class="psg-chk" value="${t}" checked> ${t}</label>
    `).join('');
        }

        function toggleAllPassages(s) { document.querySelectorAll('.psg-chk').forEach(c => c.checked = s); }

        // 핵심 수정: 힌트 생성 시 대문자 제거 로직 (Normalization)
        function generateHint(str, lv) {
            let words = str.replace(/[.;:,]/g, "").split(" ");

            if (lv == 1) {
                // 모든 단어를 소문자로 변환하여 셔플 (첫 단어 힌트 제거)
                return "( " + words.map(w => w.toLowerCase()).sort(() => Math.random() - 0.5).join(" / ") + " )";
            }

            if (lv == 2) {
                // 주요 단어만 추출 (소문자화하여 위치 힌트 제거)
                let filtered = words.filter(w => w.length >= 5 || /[A-Z]/.test(w[0])).map(w => w.toLowerCase());
                return "힌트: " + filtered.join(", ");
            }

            if (lv == 3) {
                // 핵심 키워드 중심 (소문자화)
                const keys = ["core", "cathedral", "dna", "inherent", "absolute", "distilled"];
                let filtered = words.filter(w => w.length >= 7 || keys.includes(w.toLowerCase())).map(w => w.toLowerCase());
                return filtered.length > 0 ? "핵심 힌트: " + filtered.join(", ") : "문장 구조에 유의하세요.";
            }
        }

        function initExam() {
            const mode = document.getElementById('modeSelect').value;
            const lvs = Array.from(document.querySelectorAll('.lv-chk:checked')).map(c => parseInt(c.value));
            const titles = Array.from(document.querySelectorAll('.psg-chk:checked')).map(c => c.value);

            if (lvs.length === 0 || titles.length === 0) return alert("조건을 선택해주세요!");

            sessionQuestions = db.filter(i => titles.includes(i.title) && (mode === 'perfect' || i.isThesis))
                .map(i => ({ ...i, level: lvs[Math.floor(Math.random() * lvs.length)] }))
                .sort(() => Math.random() - 0.5);

            if (sessionQuestions.length === 0) return alert("문장이 없습니다.");
            cursor = 0;
            document.getElementById('examDisplay').style.display = 'block';
            render();
        }

        function render() {
            const q = sessionQuestions[cursor];
            document.getElementById('levelBadge').innerText = `${q.title} | ${q.level}단계`;
            document.getElementById('korText').innerText = "Q. " + q.kor;
            document.getElementById('hintBox').innerText = generateHint(q.eng, q.level);
            document.getElementById('engInput').value = "";
            document.getElementById('resultMsg').innerText = "";
        }

        function processCheck() {
            const user = document.getElementById('engInput').value.trim().toLowerCase().replace(/[.;:,]/g, "");
            const real = sessionQuestions[cursor].eng.toLowerCase().replace(/[.;:,]/g, "");
            const msg = document.getElementById('resultMsg');

            if (user === real) {
                msg.style.color = "green";
                msg.innerText = "✅ 정답입니다!";
                setTimeout(() => {
                    cursor++;
                    if (cursor < sessionQuestions.length) render();
                    else alert("🎉 완료!");
                }, 1200);
            } else {
                msg.style.color = "red";
                msg.innerHTML = `❌ 오답<br>정답: ${sessionQuestions[cursor].eng}`;
            }
        }

        function saveWrong() {
            const q = sessionQuestions[cursor];
            let note = JSON.parse(localStorage.getItem('myNote') || "[]");
            if (!note.some(n => n.eng === q.eng)) {
                note.push(q);
                localStorage.setItem('myNote', JSON.stringify(note));
                loadNote();
                alert("저장됨");
            }
        }

        function loadNote() {
            const note = JSON.parse(localStorage.getItem('myNote') || "[]");
            document.getElementById('noteContainer').innerHTML = note.length ? note.map(n => `
        <div class="wrong-item"><strong>[${n.title}]</strong> ${n.kor}<br><small>${n.eng}</small></div>
    `).join('') : "기록 없음";
        }

        function clearAllNotes() { if (confirm("초기화?")) { localStorage.removeItem('myNote'); loadNote(); } }

        createPassageGrid();
        loadNote();
    </script>
</body>

</html>
